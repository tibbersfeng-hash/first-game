# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: data_configuration_format
    status: active
    api: Godot Resource (.tres/.res)
    not: JSON / CSV / inline constants
    adr: docs/architecture/adr-004-resource-data-configuration.md
    reason: "Resource provides type safety, editor integration, and nested data support; JSON lacks type checking"
    referenced_by:
      - docs/architecture/adr-004-resource-data-configuration.md
      - docs/architecture/adr-002-autoload-singletons.md
    added: 2026-06-15
    revised: ""

  - purpose: combat_timing_unit
    status: active
    api: frame_count (integer)
    not: delta_time (float seconds)
    adr: docs/architecture/adr-006-frame-based-combat-timing.md
    reason: "Fighting games require frame-precise timing; delta accumulation causes floating-point drift and inconsistent cancel windows"
    referenced_by:
      - docs/architecture/adr-006-frame-based-combat-timing.md
    added: 2026-06-15
    revised: ""

  - purpose: camera_behavior
    status: active
    api: Camera2D fixed position (no follow, no scroll)
    not: Camera2D smoothing / follow
    adr: docs/architecture/adr-005-fixed-room-size.md
    reason: "DNF-style fixed-screen combat; eliminates camera logic complexity and ensures all combatants visible"
    referenced_by:
      - docs/architecture/adr-005-fixed-room-size.md
    added: 2026-06-15
    revised: ""

