# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: autoload_cross_reference
    status: active
    description: "Autoloads must not reference other Autoloads by name. Only SignalBus may be listened to by other Autoloads."
    why: "Cross-Autoload references create hidden load-order dependencies and tight coupling between global services."
    adr: docs/architecture/adr-002-autoload-singletons.md
    added: 2026-06-15

  - pattern: signal_chain
    status: active
    description: "A SignalBus signal handler must not emit another SignalBus signal. Use direct method calls within the same system instead."
    why: "Signal chains create infinite loop risks and make event flow impossible to trace."
    adr: docs/architecture/adr-003-signal-bus.md
    added: 2026-06-15

  - pattern: runtime_resource_mutation
    status: active
    description: "Code must not modify Resource (.tres) properties at runtime. Resources are read-only configuration data."
    why: "Runtime Resource mutation breaks the data-driven model — configuration should only change via editor or reload."
    adr: docs/architecture/adr-004-resource-data-configuration.md
    added: 2026-06-15

  - pattern: delta_time_in_combat
    status: active
    description: "Combat timing logic must not use delta time or accumulate floats. Use frame counters (integer) exclusively."
    why: "Delta accumulation causes floating-point drift; cancel windows become inconsistent across frame rates."
    adr: docs/architecture/adr-006-frame-based-combat-timing.md
    added: 2026-06-15

  - pattern: direct_cross_system_state_write
    status: active
    description: "A system must never write to state owned by another system. Use signals or method calls on the owner instead."
    why: "Direct state writes create race conditions and break the state ownership model."
    adr: docs/architecture/adr-002-autoload-singletons.md
    added: 2026-06-15

