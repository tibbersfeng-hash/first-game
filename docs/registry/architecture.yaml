# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: cross_system_communication
    status: active
    pattern: signal
    producer: any-system
    consumers:
      - hud-system
      - dungeon-flow
      - audio-manager
      - damage-number
    adr: docs/architecture/adr-003-signal-bus.md
    signal_signature: "SignalBus.* (see ADR-003 for full signal list)"
    referenced_by:
      - docs/architecture/adr-003-signal-bus.md
      - docs/architecture/adr-002-autoload-singletons.md
    added: 2026-06-15
    revised: ""

  - contract: combat_config_access
    status: active
    pattern: direct_call
    producer: combat-data-autoload
    consumers:
      - combat-system
      - enemy-ai
      - combo-system
    adr: docs/architecture/adr-002-autoload-singletons.md
    signal_signature: "N/A — CombatData.get_attack_frames(), get_energy_config() etc."
    referenced_by:
      - docs/architecture/adr-002-autoload-singletons.md
      - docs/architecture/adr-004-resource-data-configuration.md
    added: 2026-06-15
    revised: ""

